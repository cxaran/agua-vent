name: agua-vent-dev

services:
  backend:
    build:
      context: ./backend
      target: dev
    image: agua-vent-backend:dev
    environment:
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_TLS: "false"
      SMTP_SSL: "false"
      SMTP_USE_CREDENTIALS: "false"
      EMAILS_FROM_EMAIL: dev@example.com
      EMAILS_FROM_NAME: Agua Vent Dev
    volumes:
      - ./backend:/app/backend

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_WEB_PORT:-8025}:8025"
    expose:
      - "1025"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: dev
    image: agua-vent:dev
    environment:
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next

volumes:
  frontend_node_modules:
  frontend_next:
