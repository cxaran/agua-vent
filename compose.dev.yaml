name: agua-vent-dev

services:
  backend:
    build:
      context: ./backend
      target: dev
    image: agua-vent-backend:dev
    volumes:
      - ./backend:/app/backend

  frontend:
    build:
      context: ./frontend
      target: dev
    image: agua-vent:dev
    environment:
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next

volumes:
  frontend_node_modules:
  frontend_next:
